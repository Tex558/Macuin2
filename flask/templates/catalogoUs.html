<!DOCTYPE html>
<html class="dark" lang="es">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>
   MACUIN INDUSTRIAL - Catalogo de productos
  </title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries">
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
  <script src="/static/js/tailwind-config.js">
  </script>
  <link href="/static/css/styles.css" rel="stylesheet"/>
  <script src="/static/js/api.js">
  </script>
 </head>
 <body class="bg-surface selection:bg-primary-container selection:text-primary">
  <header class="bg-[#041329] flex justify-between items-center w-full px-8 h-16 fixed top-0 z-50 font-['Inter'] text-[0.875rem] font-medium tracking-wide">
   <div class="flex items-center gap-8">
    <span class="text-lg font-black tracking-tighter text-[#ffb3b1]">
     MACUIN INDUSTRIAL
    </span>
    <nav class="hidden md:flex items-center gap-6">
     <a class="text-[#ffb3b1] border-b-2 border-[#ee3f4b] pb-1" href="/catalogo">
      Catalogo
     </a>
     <a class="text-[#c2c6d3] hover:text-[#ffb3b1] transition-all duration-150" href="/carrito">
      Carrito
     </a>
     <a class="text-[#c2c6d3] hover:text-[#ffb3b1] transition-all duration-150" href="/pedidos">
      Pedidos en curso
     </a>
    </nav>
   </div>
   <div class="flex items-center gap-6">
    <div class="hidden lg:flex items-center bg-surface-container-high px-3 py-1.5 border-b-2 border-outline-variant">
     <span class="material-symbols-outlined text-secondary text-sm mr-2" data-icon="search">
      search
     </span>
     <input class="bg-transparent border-none focus:ring-0 text-xs placeholder:text-outline p-0 w-48 uppercase tracking-widest" placeholder="BUSCAR SKU..." type="text" oninput="renderCat(this.value)"/>
    </div>
    <button class="bg-[#1c2a41] text-[#c2c6d3] px-4 py-2 text-xs font-bold uppercase hover:bg-surface-bright transition-all duration-150" onclick="window.Api.logout()">
     Cerrar Sesi&oacute;n
    </button>
   </div>
  </header>
  <main class="pt-24 pb-12 px-8 max-w-[1440px] mx-auto">
   <div class="mb-12 flex flex-col md:flex-row md:items-end justify-between gap-6">
    <div>
     <h1 class="text-[3.5rem] font-extrabold tracking-tighter leading-none text-on-surface uppercase mb-2">
      Cat&aacute;logo
     </h1>
    </div>
    </div>
   </div>
   <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-0" id="catalogo_grid">
   </div>
  </main>
  <script>
   document.addEventListener("DOMContentLoaded", async () => {
        window.all_prod = [];
        try {
            const res = await window.Api.getProductos();
            window.all_prod = res.data || [];
            renderCat("");
        } catch (e) {
            document.getElementById("catalogo_grid").innerHTML = '<p class="p-8 text-error">Error cargando catálogo.</p>';
        }
    });

    window.addToCart = (id) => {
        let cart = JSON.parse(localStorage.getItem('macuin_cart') || '[]');
        let item = cart.find(x => x.id == id);
        if(item) { item.qty += 1; } else { cart.push({id: id, qty: 1}); }
        localStorage.setItem('macuin_cart', JSON.stringify(cart));
        alert('Producto agregado al carrito!');
    };

    window.renderCat = (query) => {
        const c = document.getElementById("catalogo_grid");
        const list = window.all_prod.filter(p => `${p.id} ${p.nombre} ${p.fabricante}`.toLowerCase().includes(query.toLowerCase()));
        c.innerHTML = list.map(p => `
            <div class="bg-surface-container-low group border-b border-r border-outline-variant/10 p-8 flex flex-col justify-between aspect-square transition-all duration-300 hover:bg-surface-container-high">
             <div class="flex justify-between items-start">
              <span class="text-[0.65rem] font-bold text-outline uppercase tracking-[0.2em]">MAC-${p.id}</span>
              <span class="material-symbols-outlined text-primary text-xl">settings_input_component</span>
             </div>
             <div>
              <h3 class="text-xl font-bold text-on-surface leading-tight uppercase mb-2 tracking-tight">${p.nombre}</h3>
              <div class="flex items-baseline gap-2 mb-6">
               <span class="text-2xl font-black text-on-surface tracking-tighter">${parseFloat(p.precio).toLocaleString('es-MX',{style:'currency',currency:'MXN'})}</span>
               <span class="text-[0.65rem] text-secondary font-bold uppercase tracking-widest">MXN / UNIDAD</span>
              </div>
                            <button onclick="window.location.href='/producto?id=${p.id}'" class="w-full bg-on-primary-container text-white py-3 font-black text-[0.75rem] uppercase tracking-widest transition-all active:scale-95 duration-100 flex items-center justify-center gap-2">
                               Ver detalles <span class="material-symbols-outlined text-sm">chevron_right</span>
                              </button>
                              ${p.stock > 0 
                                ? `<button onclick="addToCart(${p.id})" class="w-full mt-2 bg-surface-container-highest text-primary py-3 font-black text-[0.75rem] uppercase tracking-widest transition-all active:scale-95 hover:bg-surface-bright duration-100 flex items-center justify-center gap-2">
                                     <span class="material-symbols-outlined text-sm">add_shopping_cart</span> Al Carrito
                                   </button>`
                                : `<button disabled class="w-full mt-2 bg-surface-container-highest text-secondary opacity-50 py-3 font-black text-[0.7rem] uppercase tracking-widest cursor-not-allowed flex items-center justify-center gap-2">
                                     <span class="material-symbols-outlined text-sm">block</span> SIN EXISTENCIAS
                                   </button>`
                              }
                             </div>
                            </div>
                        `).join('');
    };

  </script>
 
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const path = window.location.pathname;
        const links = document.querySelectorAll('header nav a');
        links.forEach(l => {
            const href = l.getAttribute('href');
            if(path.includes(href) && href !== '/') {
                l.className = "text-[#ffb3b1] border-b-2 border-[#ee3f4b] pb-1";
            } else {
                l.className = "text-[#c2c6d3] hover:text-[#ffb3b1] transition-all duration-150";
            }
        });
    });
</script>

</body>
</html>
