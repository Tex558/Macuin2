<!DOCTYPE html>
<html class="dark" lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="/static/js/tailwind-config.js"></script>
<link href="/static/css/styles.css" rel="stylesheet"/>
<script src="/static/js/api.js"></script>
</head>
<body class="font-body antialiased selection:bg-on-primary-container selection:text-white">
<header class="bg-[#041329] flex justify-between items-center w-full px-8 h-16 fixed top-0 z-50 font-['Inter'] text-[0.875rem] font-medium tracking-wide">
<div class="flex items-center gap-8">
<span class="text-lg font-black tracking-tighter text-[#ffb3b1]">
MACUIN INDUSTRIAL
</span>
<nav class="hidden md:flex items-center gap-6" id="main-nav">
<a href="/catalogo">Catalogo</a>
<a href="/carrito">Carrito</a>
<a href="/pedidos">Pedidos en curso</a>
</nav>
</div>
<div class="flex items-center">
<button class="bg-[#1c2a41] text-[#c2c6d3] px-4 py-2 text-xs font-bold uppercase hover:bg-surface-bright transition-all duration-150" onclick="window.Api.logout()">
Cerrar Sesi&oacute;n
</button>
</div>
</header>
<main class="pt-24 pb-12 px-8 max-w-7xl mx-auto">
<header class="mb-12">
<h1 class="text-3xl font-black tracking-tighter text-on-surface uppercase mb-2">
Orden de Compra
</h1>
</header>
<div class="grid grid-cols-1 lg:grid-cols-12 gap-0 border-t border-outline-variant/20">
<section class="lg:col-span-7 py-8 lg:pr-12">
<div class="flex justify-between items-end mb-8">
<h2 class="text-xs font-bold uppercase tracking-widest text-primary">
Componentes Seleccionados
</h2>
</div>
<div class="space-y-4" id="carrito_grid">
</div>
<div class="mt-8 pt-8 border-t border-outline-variant/10 flex flex-col gap-2">
<div class="flex justify-between items-baseline">
<span class="text-xs uppercase font-bold text-secondary">
Subtotal Log&iacute;stico
</span>
<span id="c-sub" class="text-sm font-mono">$0.00</span>
</div>
<div class="flex justify-between items-baseline">
<span class="text-xs uppercase font-bold text-secondary">
Impuestos Estimados (IVA 16%)
</span>
<span id="c-iva" class="text-sm font-mono">$0.00</span>
</div>
</div>
</section>
<aside class="lg:col-span-5 bg-surface-container-low py-8 lg:p-12 border-l border-outline-variant/20">
<h2 class="text-xs font-bold uppercase tracking-widest text-primary mb-8">
Informaci&oacute;n de Despacho
</h2>
<form id="form-pago" class="space-y-8">
<div class="space-y-6">
<div class="relative">
<label class="block text-[10px] uppercase font-black tracking-tighter text-secondary mb-1">
Direcci&oacute;n de Entrega Industrial
</label>
<input class="w-full bg-surface-container-highest border-none border-b-2 border-outline-variant/30 text-on-surface text-sm p-3 focus:ring-0 focus:border-on-primary-container transition-all" type="text" id="c-dir" value="Calle de la Industria #402, Zona Industrial"/>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="relative">
<label class="block text-[10px] uppercase font-black tracking-tighter text-secondary mb-1">
C&oacute;digo Postal
</label>
<input class="w-full bg-surface-container-highest border-none border-b-2 border-outline-variant/30 text-on-surface text-sm p-3 focus:ring-0 focus:border-on-primary-container transition-all" type="text" value="76000"/>
</div>
<div class="relative">
<label class="block text-[10px] uppercase font-black tracking-tighter text-secondary mb-1">
Tel&eacute;fono de Enlace
</label>
<input class="w-full bg-surface-container-highest border-none border-b-2 border-outline-variant/30 text-on-surface text-sm p-3 focus:ring-0 focus:border-on-primary-container transition-all" type="tel" id="c-tel" value="+52 442 198 2233"/>
</div>
</div>
</div>
<div class="pt-8 border-t border-outline-variant/10">
<h2 class="text-xs font-bold uppercase tracking-widest text-primary mb-6">
M&eacute;todo de Pago
</h2>
<div class="space-y-6">
<div class="relative">
<label class="block text-[10px] uppercase font-black tracking-tighter text-secondary mb-1">
Titular de la Tarjeta
</label>
<input class="w-full bg-surface-container-highest border-none border-b-2 border-outline-variant/30 text-on-surface text-sm p-3 focus:ring-0 focus:border-on-primary-container transition-all" placeholder="NOMBRE COMPLETO" type="text"/>
</div>
<div class="relative">
<label class="block text-[10px] uppercase font-black tracking-tighter text-secondary mb-1">
N&uacute;mero de Tarjeta de Cr&eacute;dito/D&eacute;bito
</label>
<div class="relative flex items-center">
<input class="w-full bg-surface-container-highest border-none border-b-2 border-outline-variant/30 text-on-surface text-sm p-3 focus:ring-0 focus:border-on-primary-container transition-all pr-12" id="c-tarj" placeholder="**** **** **** 4421" required type="text"/>
<span class="absolute right-3 material-symbols-outlined text-secondary text-lg">
credit_card
</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="relative">
<label class="block text-[10px] uppercase font-black tracking-tighter text-secondary mb-1">
Expiraci&oacute;n (MM/YY)
</label>
<input class="w-full bg-surface-container-highest border-none border-b-2 border-outline-variant/30 text-on-surface text-sm p-3 focus:ring-0 focus:border-on-primary-container transition-all" placeholder="04 / 28" type="text"/>
</div>
<div class="relative">
<label class="block text-[10px] uppercase font-black tracking-tighter text-secondary mb-1">
CVC/CVV
</label>
<input class="w-full bg-surface-container-highest border-none border-b-2 border-outline-variant/30 text-on-surface text-sm p-3 focus:ring-0 focus:border-on-primary-container transition-all" placeholder="***" type="password"/>
</div>
</div>
</div>
</div>
<div class="pt-8">
<div class="flex justify-between items-end mb-6">
<span class="text-xs uppercase font-black tracking-tighter text-on-surface">
Total Final Facturado
</span>
<span id="c-tot" class="text-3xl font-black tracking-tighter text-primary">$0.00</span>
</div>
<button class="w-full bg-on-primary-container text-white text-sm font-black uppercase tracking-[0.2em] py-5 px-8 hover:bg-opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-3" type="submit">
Proceed to Summary
<span class="material-symbols-outlined text-lg">
arrow_forward
</span>
</button>
</div>
</form>
</aside>
</div>
</main>
<script>
document.addEventListener("DOMContentLoaded", async () => {
const path = window.location.pathname;
const navLinks = document.querySelectorAll('#main-nav a');
navLinks.forEach(link => {
const href = link.getAttribute('href');
if (path === href) {
link.className = "text-[#ffb3b1] border-b-2 border-[#ee3f4b] pb-1";
} else {
link.className = "text-[#c2c6d3] hover:text-[#ffb3b1] transition-all duration-150";
}
});
const container = document.getElementById("carrito_grid");
let cart = JSON.parse(localStorage.getItem('macuin_cart') || '[]');
if(cart.length === 0) {
container.innerHTML = `
<div class="p-12 text-center border border-dashed border-outline-variant/30 flex flex-col items-center justify-center">
<span class="material-symbols-outlined text-4xl text-outline-variant mb-4">shopping_cart</span>
<p class="text-secondary text-sm font-bold uppercase tracking-widest">El carrito de compras está vacío.</p>
<a href="/catalogo" class="mt-6 text-primary text-xs font-black uppercase tracking-tighter hover:underline">Explorar Catálogo</a>
</div>`;
return;
}
try {
const res = await window.Api.getProductos();
const prods = res.data || [];
let subtotal = 0;
let html = '';
cart.forEach(item => {
const p = prods.find(x => x.id == item.id);
if(p) {
const lineTot = item.qty * parseFloat(p.precio);
subtotal += lineTot;
html += `
<div class="flex items-center justify-between p-4 bg-surface-container-low border border-outline-variant/10">
<div>
<p class="text-sm font-bold text-on-surface uppercase">${p.nombre}</p>
<p class="text-[0.65rem] text-secondary uppercase tracking-widest">Q: ${item.qty} | SKU: MAC-${p.id}</p>
</div>
<div class="text-right">
<p class="text-sm font-mono font-bold">${lineTot.toLocaleString('en-US',{style:'currency',currency:'USD'})}</p>
</div>
</div>`;
}
});
container.innerHTML = html;
const iva = subtotal * 0.16;
const final = subtotal + iva;
document.getElementById('c-sub').innerText = subtotal.toLocaleString('en-US',{style:'currency',currency:'USD'});
document.getElementById('c-iva').innerText = iva.toLocaleString('en-US',{style:'currency',currency:'USD'});
document.getElementById('c-tot').innerText = final.toLocaleString('en-US',{style:'currency',currency:'USD'});
} catch(e) { console.error(e); }
let formPago = document.getElementById('form-pago');
if(formPago) {
formPago.addEventListener('submit', (e) => {
e.preventDefault();
const dir = document.getElementById('c-dir');
const tel = document.getElementById('c-tel');
const tarj = document.getElementById('c-tarj');
if(!tarj || !tarj.value) return alert('Datos Incompletos');
localStorage.setItem('macuin_checkout_data', JSON.stringify({direccion: dir.value, telefono: tel.value, tarjeta: tarj.value}));
window.location.href = '/resumen';
});
}
});
</script>
</body>
</html>
